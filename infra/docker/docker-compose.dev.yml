version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: janus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - janus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Included Local ChromaDB for Development alternative to Pinecone
  chromadb:
    image: chromadb/chroma:latest
    container_name: janus-chroma
    ports:
      - "8000:8000"
    volumes:
      - janus_chromadb_data:/chroma/chroma

volumes:
  janus_postgres_data:
  janus_chromadb_data:
