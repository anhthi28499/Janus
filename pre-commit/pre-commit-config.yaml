repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Backend: Ruff (Python)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.3
    hooks:
      - id: ruff
        args: [ --fix ]
        files: ^apps/backend/
      - id: ruff-format
        files: ^apps/backend/

  # Frontend + Mobile + Shared: Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^(apps/web/|apps/mobile/|packages/shared)/
        types_or: [javascript, jsx, ts, tsx, vue, css, scss, html, json, markdown]
        additional_dependencies:
          - prettier@3.2.5
          - prettier-plugin-tailwindcss@0.5.11

  # Frontend (web): ESLint
  - repo: local
    hooks:
      - id: eslint-web
        name: eslint (web)
        files: ^apps/web/
        types_or: [javascript, jsx, ts, tsx, vue]
        entry: npm run lint --prefix apps/web
        language: system
        pass_filenames: false

  # Mobile: ESLint
  - repo: local
    hooks:
      - id: eslint-mobile
        name: eslint (mobile)
        files: ^apps/mobile/
        types_or: [javascript, jsx, ts, tsx]
        entry: npm run lint --prefix apps/mobile
        language: system
        pass_filenames: false
