repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Backend: Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.3
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # Frontend: Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, vue, css, scss, html, json, markdown]
        additional_dependencies:
          - prettier@3.2.5
          - prettier-plugin-tailwindcss@0.5.11

  # Frontend: ESLint (Handled mostly via local scripts, but can run via pre-commit if needed)
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint --prefix FE
        language: system
        types_or: [javascript, jsx, ts, tsx, vue]
        pass_filenames: false
